# ============================================================
# Inference Configuration - PCB Defect Detection
# ============================================================

model:
  weights: models/detector/best.pt    # Path to trained weights
  device: "0"                         # Use GPU; set to "cpu" for CPU-only

detection:
  conf_threshold: 0.35               # Min confidence to report defect
  iou_threshold: 0.45                # NMS IoU threshold
  max_detections: 300
  image_size: 640
  augment: false                     # TTA - disable for speed

classes:
  - missing_hole
  - mouse_bite
  - open_circuit
  - short
  - spur
  - spurious_copper

# Severity mapping per defect class
severity:
  missing_hole: high
  mouse_bite: medium
  open_circuit: critical
  short: critical
  spur: low
  spurious_copper: medium

visualization:
  show_labels: true
  show_confidence: true
  line_thickness: 2
  font_scale: 0.6
  color_map:
    missing_hole: [255, 0, 0]        # Red
    mouse_bite: [255, 128, 0]        # Orange
    open_circuit: [255, 0, 255]      # Magenta
    short: [0, 0, 255]              # Blue
    spur: [0, 255, 0]               # Green
    spurious_copper: [0, 255, 255]  # Cyan

output:
  save_dir: outputs/detections
  save_images: true
  save_json: true
  save_txt: false
