# ============================================================
# LoRA Fine-Tuning Configuration - Qwen2.5-1.5B-Instruct
# Optimized for RTX 4050 Laptop GPU (6GB VRAM)
# ============================================================

base_model:
  name: Qwen/Qwen2.5-1.5B-Instruct
  local_dir: models/llm/qwen2.5-1.5b
  torch_dtype: float16
  trust_remote_code: true

lora:
  r: 16                          # LoRA rank - higher = more parameters, more capacity
  lora_alpha: 32                 # Scaling factor (usually 2x rank)
  target_modules:                # Which weight matrices to adapt
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_dropout: 0.1              # Dropout for regularization
  bias: none                     # Don't adapt bias terms
  task_type: CAUSAL_LM           # Causal language modeling

training:
  output_dir: models/llm/fine_tuned_qwen
  num_train_epochs: 3
  per_device_train_batch_size: 2  # Small batch for 6GB VRAM
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8  # Effective batch = 2*8 = 16
  gradient_checkpointing: true    # Saves VRAM at cost of some speed
  warmup_steps: 100
  learning_rate: 2.0e-4
  weight_decay: 0.01
  lr_scheduler_type: cosine
  save_steps: 100
  eval_steps: 100
  logging_steps: 10
  max_grad_norm: 1.0
  fp16: true                      # Mixed precision training
  bf16: false                     # Use fp16, not bf16 (better on older GPUs)
  dataloader_num_workers: 2
  remove_unused_columns: false
  group_by_length: true           # Group similar length sequences for efficiency

dataset:
  path: data/fine_tuning/pcb_instructions.json
  train_split: 0.9
  val_split: 0.1
  max_length: 1024               # Max sequence length
  seed: 42

generation:
  synthetic_samples: 500         # Number of synthetic training examples to generate
  output_path: data/fine_tuning/pcb_instructions.json

evaluation:
  compute_metrics: true
  metric_for_best_model: eval_loss
  greater_is_better: false

mlflow:
  enabled: true
  experiment_name: PCB_LLM_FineTuning
