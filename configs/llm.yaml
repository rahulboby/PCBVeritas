# ============================================================
# LLM Configuration - Qwen2.5-1.5B-Instruct (Local)
# Runs fully offline on RTX 4050 (6GB VRAM)
# ============================================================

model:
  name: Qwen/Qwen2.5-1.5B-Instruct          # HuggingFace model ID
  local_dir: models/llm/qwen2.5-1.5b        # Local cache directory
  device_map: auto                           # Auto device placement
  torch_dtype: float16                       # Use fp16 for memory efficiency
  trust_remote_code: true

generation:
  max_new_tokens: 512                        # Max tokens in generated response
  temperature: 0.3                           # Low temperature for factual reports
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  do_sample: true

tokenizer:
  max_input_length: 2048                     # Max input context length
  padding_side: left                         # For batch inference

# RAG system prompt template
system_prompt: |
  You are an expert PCB (Printed Circuit Board) inspection engineer with 20 years of 
  experience in electronics manufacturing quality control. You analyze PCB defects and 
  provide detailed technical reports for manufacturing engineers.
  
  When given defect information, you must provide:
  1. Clear defect description
  2. Root cause analysis
  3. Severity assessment
  4. Manufacturing process implications
  5. Specific repair or corrective action recommendations
  
  Be precise, technical, and actionable. Format your response as a structured report.

output:
  reports_dir: outputs/reports
  format: markdown                           # Output format: markdown or plain
