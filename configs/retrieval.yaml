# ============================================================
# Retrieval Configuration - SigLIP + FAISS
# ============================================================

embedding:
  model_name: google/siglip-base-patch16-224   # SigLIP model on HuggingFace
  model_dir: models/embeddings/siglip          # Local cache directory
  image_size: 224                              # SigLIP input resolution
  embedding_dim: 768                           # Output embedding dimension
  batch_size: 32                               # Batch size for embedding generation
  device: "cuda"                               # "cuda" or "cpu"
  normalize: true                              # L2-normalize embeddings

faiss:
  index_type: IndexFlatIP                      # Inner product (cosine with normalized vectors)
  # Alternative: IndexIVFFlat for larger datasets (>100k vectors)
  index_path: data/embeddings/faiss_index.bin
  metadata_path: data/embeddings/metadata.json
  nprobe: 10                                   # Only for IVF indexes

retrieval:
  top_k: 3                                     # Return top 3 similar defects
  min_similarity: 0.5                          # Minimum similarity score (0-1)
  same_class_weight: 0.3                       # Bonus weight for same defect class

crops:
  padding: 20                                  # Pixels of padding around bounding box
  min_size: 32                                 # Minimum crop size (pixels)
  save_crops: true
  crops_dir: data/processed/crops

output:
  retrieved_dir: outputs/retrieved
  show_similarity_score: true
