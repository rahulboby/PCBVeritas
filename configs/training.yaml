# ============================================================
# Training Configuration - YOLOv8s PCB Defect Detector
# Optimized for RTX 4050 Laptop GPU (6GB VRAM)
# ============================================================

model:
  architecture: yolov8s           # YOLOv8 Small - best speed/accuracy for 6GB VRAM
  pretrained: true                # Start from COCO pretrained weights
  pretrained_weights: yolov8s.pt  # Auto-downloaded by ultralytics

dataset:
  path: data/splits/dataset.yaml  # Auto-generated by prepare_dataset.py
  train: data/splits/train
  val: data/splits/val
  test: data/splits/test
  classes:
    - missing_hole
    - mouse_bite
    - open_circuit
    - short
    - spur
    - spurious_copper
  num_classes: 6

training:
  epochs: 100
  batch_size: 16                  # Safe for 6GB VRAM with YOLOv8s
  image_size: 640                 # Standard YOLO input size
  workers: 4                      # CPU workers for data loading
  device: "0"                     # GPU device ID (0 = first GPU)
  seed: 42

optimizer:
  name: AdamW
  lr0: 0.001                      # Initial learning rate
  lrf: 0.01                       # Final lr = lr0 * lrf
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

augmentation:
  hsv_h: 0.015                    # Hue augmentation
  hsv_s: 0.7                      # Saturation augmentation
  hsv_v: 0.4                      # Value augmentation
  degrees: 0.0                    # Rotation (we handle rotation in preprocessing)
  translate: 0.1                  # Translation fraction
  scale: 0.5                      # Scale gain
  shear: 0.0
  perspective: 0.0
  flipud: 0.0                     # Flip up-down probability
  fliplr: 0.5                     # Flip left-right probability
  mosaic: 1.0                     # Mosaic augmentation
  mixup: 0.0                      # MixUp augmentation

loss:
  box: 7.5                        # Box loss weight
  cls: 0.5                        # Class loss weight
  dfl: 1.5                        # Distribution Focal Loss weight

evaluation:
  conf_threshold: 0.25            # Confidence threshold for evaluation
  iou_threshold: 0.45             # IoU threshold for NMS
  max_det: 300                    # Maximum detections per image

output:
  project: runs/detect
  name: pcb_defect_detector
  save: true
  save_period: 10                 # Save checkpoint every N epochs
  plots: true                     # Generate training plots
  verbose: true

mlflow:
  enabled: true
  experiment_name: PCB_Defect_Detection
  tracking_uri: logs/mlflow
